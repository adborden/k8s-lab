---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://jellyfin.github.io/jellyfin-helm
    chart: jellyfin
    targetRevision: 3.2.0
    helm:
      releaseName: jellyfin
      valuesObject:
        deploymentStrategy:
          type: Recreate
        persistence:
          config:
            enabled: true
            size: 5Gi
            storageClass: ceph-ssd
          media:
            enabled: true
            size: 250Gi
            storageClass: ceph-hdd
        ingress:
          enabled: true
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt
          className: nginx
          hosts:
            - host: jellyfin.fl.a14n.net
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - jellyfin.fl.a14n.net
              secretName: jellyfin-tls
        resources:
          limits:
            cpu: 2000m
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 1Gi
        metrics:
          enabled: true
          serviceMonitor:
            enabled: true
        nodeSelector:
          a14n.net/storage: ceph
  destination:
    server: https://kubernetes.default.svc
    namespace: jellyfin
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
