---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-csi-drivers
  namespace: argocd
spec:
  project: default
  sources:
    - chart: ceph-csi-drivers
      repoURL: https://ceph.github.io/ceph-csi-operator
      targetRevision: 1.0.1
      helm:
        valueFiles:
          - $values/rook-ceph/values.yaml
    - repoURL: https://github.com/adborden/k8s-lab.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: rook-ceph
  syncPolicy:
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
